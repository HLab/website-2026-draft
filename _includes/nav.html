<nav class="site-nav" id="siteNav">
    <div class="container nav-inner">
        <a href="{{ '/' | relative_url }}" class="nav-logo">
            <img src="{{ '/assets/images/logo/brain-hex-transparent-bg.png' | relative_url }}" alt="" class="nav-logo-icon">
            <span class="nav-logo-text"><span class="honey">honey</span><span class="lab">lab</span></span>
        </a>
        <input type="checkbox" id="navCheck" class="nav-check">
        <label for="navCheck" class="nav-toggle" aria-label="Toggle navigation">
            <span></span>
            <span></span>
            <span></span>
        </label>
        <div class="nav-links">
            {% assign nav_items = "People:/people/,Research:/research/,Publications:/publications/,Resources:/resources/" | split: "," %}
            {% for item in nav_items %}
                {% assign parts = item | split: ":" %}
                <a href="{{ parts[1] | relative_url }}"{% if page.url == parts[1] %} class="active"{% endif %}>{{ parts[0] }}</a>
            {% endfor %}
        </div>
    </div>
</nav>
