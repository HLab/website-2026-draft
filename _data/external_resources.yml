# Related Tools
- name: "RAVE — Reproducible Analysis and Visualization of iEEG"
  category: tools
  url: https://rave.wiki
  description: Open-source platform for analyzing intracranial EEG data, including ECoG and depth electrodes.
  group: "Beauchamp Lab"

# Open Datasets
- name: "OpenNeuro"
  category: data
  url: https://openneuro.org
  description: Open repository for neuroimaging datasets (MRI, fMRI, MEG, EEG, iEEG) in BIDS format.

- name: "Courtois NeuroMod"
  category: data
  url: https://www.cneuromod.ca
  description: Deeply sampled fMRI, MEG, and behavioral data from a small cohort across diverse tasks and naturalistic stimuli.

# Books & Courses
- name: "Statistical Thinking for the 21st Century"
  category: learning
  url: https://statsthinking21.github.io/statsthinking21-core-site/
  description: Open textbook teaching statistics through simulation and real datasets rather than traditional formula-based methods.
  group: "Poldrack"

- name: "Better Code, Better Science"
  category: learning
  url: https://bettercodebetterscience.github.io/book/
  description: Open textbook on version control, testing, reproducibility, and AI-assisted coding for scientists.
  group: "Poldrack"

# Community
- name: "CCNeuro — Conference on Cognitive Computational Neuroscience"
  category: community
  url: https://ccneuro.org
  description: Annual conference bridging cognitive science, neuroscience, and AI.

- name: "Neuromatch — Computational Neuroscience"
  category: learning
  url: https://compneuro.neuromatch.io/tutorials/intro.html
  description: Open course covering computational neuroscience fundamentals.

- name: "Neuromatch — NeuroAI"
  category: learning
  url: https://neuroai.neuromatch.io/tutorials/intro.html
  description: Open course on neuroscience and artificial intelligence.
